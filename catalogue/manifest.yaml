apiVersion: apps/v1
kind: Deployment
metadata:
 # deployment labels
  name: catalogue
  namespace: roboshop
  labels:
   component: catalogue
   project: roboshop
   tier: app
spec:
  replicas: 1
    # These are the labels replica set use to create pod replicas, this should match pod labels
  selector:
    matchLabels:
     component: catalogue
     project: roboshop
     tier: app
      # This is pod definition
  template:
    metadata:
      labels:
        component:catalogue
        project: roboshop
        tier: app
    spec:
      containers:
      - name: nginx
        image: 9347673562/catalogue:v1
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue
  labels:
   component: catalogue
   project: roboshop
   tier: app
spec:
  selector:
    component: catalogue
    project: roboshop
    tier: app
  ports:
   - protocol: TCP
     port:  27017  # service port
     targetPort: 27017   # container port
