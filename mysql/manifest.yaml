apiVersion: apps/v1
kind: Deployment
metadata:
 # deployment labels
  name: mysql
  namespace: roboshop
  labels:
   component: mysql
   project: roboshop
   tier: database
   type: Opaque
data:
  MYSQL_ROOT_PASSWORD: "Um9ib3Nob3BAMQ=="
spec:
  replicas: 1
    # These are the labels replica set use to create pod replicas, this should match pod labels
  selector:
    matchLabels:
     component: mysql
     project: roboshop
     tier: database
      # This is pod definition
  template:
    metadata:
      labels:
        component: mysql
        project: roboshop
        tier: database
    spec:
      containers:
      - name: nginx
        image: 9347673562/mysql:v1
        envFrom:
        - secretRef:
            name: mysql
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  labels:
   component: mysql
   project: roboshop
   tier: database
spec:
  selector:
    component: mysql
    project: roboshop
    tier: database
  ports:
   - protocol: TCP
     port:  3306  # service port
     targetPort: 3306   # container port
