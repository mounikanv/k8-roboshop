apiVersion: apps/v1
kind: Deployment
metadata:
 # deployment labels
  name: mongodb
  namespace: roboshop
  labels:
   component: mongodb
   project: roboshop
   app: nginx
spec:
  replicas: 1
    # These are the labels replica set use to create pod replicas, this should match pod labels
  selector:
    matchLabels:
     component: mongodb
     project: roboshop
     app: nginx
      # This is pod definition
  template:
    metadata:
      labels:
        component: mongodb
        project: roboshop
        app: nginx
    spec:
      containers:
      - name: nginx
        image: 9347673562/mongodb:v1
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  labels:
    component: mongodb
    project: roboshop
    tier: database
spec:
  containers:
  - name: nginx
    image: nginx         
       
