apiVersion: apps/v1
kind: Deployment
metadata:
 # deployment labels
  name: nginx-deployment
  labels:
   purpose: deployment-demo 
   project: roboshop
   app: nginx
spec:
  replicas: 3
    # These are the labels replica set use to create pod replicas, this should match pod labels
  selector:
    matchLabels:
     purpose: deployment-demo 
     project: roboshop
     app: nginx
      # This is pod definition
  template:
    metadata:
      labels:
        purpose: deployment-demo 
        project: roboshop
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:stable-perl
       
